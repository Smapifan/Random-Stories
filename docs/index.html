<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Random Stories</title>

<style>
:root{
  --scale:1;
  --bg:#0f1115;
  --card:#171a21;
  --text:#e6e6e6;
  --muted:#9aa0a6;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  transform:scale(var(--scale));
  transform-origin:top left;
}

header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-bottom:1px solid #333;
  align-items:center;
}

.controls{
  display:flex;
  gap:8px;
  align-items:center;
}

select, input{
  padding:6px;
}

#container{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:var(--card);
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.title{font-weight:bold;}
.meta{font-size:12px;color:var(--muted);}
.desc{font-size:13px;margin-top:5px;}

#view{
  display:none;
  padding:15px;
}

button{
  cursor:pointer;
  padding:6px;
}
</style>
</head>

<body>

<header>
  <div>📚 Stories</div>

  <div class="controls">
    <select id="lang"></select>

    <label>🔎</label>
    <input id="search" placeholder="search">

    <label>📏</label>
    <input type="range" min="0.8" max="1.6" step="0.1" value="1" oninput="setScale(this.value)">

    <button onclick="toggleTheme()">🌓</button>
  </div>
</header>

<div id="container"></div>

<div id="view">
  <button onclick="back()">⬅ Back</button>
  <div id="content"></div>
</div>

<script src="storys.js"></script>

</body>
</html>
